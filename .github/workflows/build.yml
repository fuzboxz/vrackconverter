name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # Only run on canonical repo or PRs to it
    if: github.repository == 'fuzboxz/vrackconverter' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          # PRs get isolated cache scope, never shared with main branch
          key: go-${{ runner.os }}-${{ github.event_name }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-push-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build binary (required for CLI integration tests)
        run: go build -ldflags "-X main.Version=dev" -o vrackconverter ./cmd/vrackconverter/

      - name: Run tests
        run: go test -v -race ./...

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    needs: test
    # Only run on canonical repo for releases
    if: github.repository == 'fuzboxz/vrackconverter' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ github.event_name }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-push-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/heads/}-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE_NAME="vrackconverter-${{ matrix.goos }}-${{ matrix.goarch }}"
          BINARY_EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_EXT=".exe"
          fi

          # Create directory structure
          mkdir -p "$ARCHIVE_NAME"

          # Build binary with simple name
          go build -ldflags "-X main.Version=$VERSION" -o "$ARCHIVE_NAME/vrackconverter$BINARY_EXT" ./cmd/vrackconverter/

          # Create archive
          if [ "${{ matrix.goos }}" = "windows" ]; then
            # Use PowerShell Compress-Archive for Windows (zip not in PATH)
            powershell -Command "Compress-Archive -Path '$ARCHIVE_NAME' -DestinationPath '$ARCHIVE_NAME.zip'"
            echo "ARCHIVE_NAME=$ARCHIVE_NAME.zip" >> $GITHUB_ENV
          else
            # Use tar.gz for Unix
            tar -czf "$ARCHIVE_NAME.tar.gz" "$ARCHIVE_NAME"
            echo "ARCHIVE_NAME=$ARCHIVE_NAME.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        # Only upload for tags, not for main branch pushes
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: vrackconverter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 90

  release:
    name: Release
    runs-on: ubuntu-latest
    # Only run on canonical repo tags
    if: github.repository == 'fuzboxz/vrackconverter' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare checksums
        run: |
          cd artifacts
          # Generate checksums for all archive files
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | sort > checksums.txt
          cat checksums.txt

      - name: Create release
        env:
          NOTES_FILE: ${{ runner.temp }}/release-notes.txt
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          {
            printf "## What's Changed\n\n"
            if [ -n "$PREV_TAG" ]; then
              git log "$PREV_TAG..HEAD" --pretty=format:"- %s" --no-merges | grep -vi 'claude'
            else
              printf "- Initial release\n"
            fi
          } > "$NOTES_FILE"

          cat "$NOTES_FILE"

          gh release create '${{ github.ref_name }}' \
            --notes-file "$NOTES_FILE" \
            artifacts/vrackconverter-*/*/*.tar.gz \
            artifacts/vrackconverter-*/*/*.zip \
            artifacts/checksums.txt
        shell: bash
