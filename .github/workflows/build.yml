name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # Always run on PRs (including forks), and only on tags for the canonical repo
    # Skip on main branch pushes since PRs are already tested before merge
    if: github.event_name == 'pull_request' || (github.repository == 'fuzboxz/vrackconverter' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          # PRs get isolated cache scope, never shared with main branch
          key: go-${{ runner.os }}-${{ github.event_name }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-push-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build binary (required for CLI integration tests)
        run: go build -ldflags "-X main.Version=dev" -o vrackconverter ./cmd/vrackconverter/

      - name: Run tests
        run: go test -v -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    # Only run on canonical repo for releases
    if: github.repository == 'fuzboxz/vrackconverter' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          ARCHIVE_NAME="vrackconverter-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="vrackconverter.exe"
            go build -ldflags "-X main.Version=$VERSION" -o "$BINARY_NAME" ./cmd/vrackconverter/
            zip -q "$ARCHIVE_NAME.zip" "$BINARY_NAME"
            echo "ARCHIVE_NAME=$ARCHIVE_NAME.zip" >> "$GITHUB_ENV"
          else
            BINARY_NAME="vrackconverter"
            go build -ldflags "-X main.Version=$VERSION" -o "$BINARY_NAME" ./cmd/vrackconverter/
            tar -czf "$ARCHIVE_NAME.tar.gz" "$BINARY_NAME"
            echo "ARCHIVE_NAME=$ARCHIVE_NAME.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vrackconverter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 90

  release:
    name: Release
    runs-on: ubuntu-latest
    # Only run on canonical repo tags
    if: github.repository == 'fuzboxz/vrackconverter' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare checksums
        run: |
          cd artifacts
          # Generate checksums for all archive files
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | sort > checksums.txt
          cat checksums.txt

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create '${{ github.ref_name }}' \
            --generate-notes \
            -- \
            artifacts/**/*.tar.gz \
            artifacts/**/*.zip \
            artifacts/checksums.txt
